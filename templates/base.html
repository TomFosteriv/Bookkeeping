<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bookkeeping</title>
  </head>
  <body>
    <header>
      <h1>Bookkeeping</h1>
    </header>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
        {% for m in messages %}
          <li>{{ m }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </body>
</html>
