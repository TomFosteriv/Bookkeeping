{% extends 'base.html' %}
{% block content %}
  <h2>Trial Balance for {{ company.name }}</h2>
  <table>
    <thead><tr><th>Account</th><th>Debit</th><th>Credit</th></tr></thead>
    <tbody>
    {% for row in accounts %}
      <tr>
        <td>{{ row.account.name }}</td>
        <td>{{ row.debit }}</td>
        <td>{{ row.credit }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
  <p><a href="/">Back</a></p>
{% endblock %}
